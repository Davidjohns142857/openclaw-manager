interface:
  display_name: "OpenClaw Manager"
  short_description: "Control sessions, runs, checkpoints, and focus"
  default_prompt: "Use $openclaw-manager to inspect sessions, resume a stalled task, or export a share snapshot. Default to the same-machine local chain: local OpenClaw Gateway + local manager sidecar + optional public ingest. Do not default to SSH, VPS deployment, or remote service management unless the user explicitly asks for remote infrastructure work. Only surface a console URL when /health advertises a published ui.session_console_url; do not send 127.0.0.1 links to remote or mobile users. If hook install is unavailable, explicitly fall back to manual /adopt workflow."

policy:
  allow_implicit_invocation: true
