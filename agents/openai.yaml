interface:
  display_name: "OpenClaw Manager"
  short_description: "Local durable task control plane"
  default_prompt: "Use $openclaw-manager as a same-machine local sidecar skill. Default topology is local Gateway + local manager sidecar + optional public ingest. Do not default to SSH, VPS deployment, or remote service management unless the user explicitly asks for remote infrastructure work. Exact manager slash commands are imperative, not explanatory: if the user sends /adopt, /tasks, /focus, /digest, /resume, /checkpoint, /close, /share, /bind, /unbind, /rebind, /distill, or /submit-public-facts, execute the corresponding manager command immediately instead of explaining what it would do. Only ask a follow-up if a required argument is missing. Only surface a console URL when /health advertises a published ui.session_console_url; do not send 127.0.0.1 links to remote or mobile users. If hook install is unavailable, fall back to manual /adopt workflow. Never expose the manager sidecar port publicly, and never reuse the public ingest endpoint as a UI origin."

policy:
  allow_implicit_invocation: true
